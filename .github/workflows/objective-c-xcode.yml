name: Legacy iOS 9 CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

env:
  PROJECT_PATH: Ninegram.xcodeproj
  SCHEME: Ninegram
  TARGET: Ninegram
  TEST_DESTINATION: platform=iOS Simulator,name=iPhone 8
  XCODE_DEVELOPER_DIR: /Applications/Xcode_13.4.1.app/Contents/Developer

jobs:
  legacy-ios-build:
    name: Build and test with Xcode 13.4.1 on legacy macOS
    runs-on: [self-hosted, macOS, legacy-ios, xcode-13]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate runner OS and Xcode path
        shell: bash
        run: |
          set -euo pipefail

          os_version="$(sw_vers -productVersion)"
          case "$os_version" in
            11.*|12.*)
              ;;
            *)
              echo "This workflow expects a self-hosted macOS 11 (Big Sur) or macOS 12 (Monterey) runner."
              echo "Current runner version: $os_version"
              exit 1
              ;;
          esac

          if [ ! -d "$XCODE_DEVELOPER_DIR" ]; then
            echo "Expected Xcode 13.x at: $XCODE_DEVELOPER_DIR"
            exit 1
          fi

          echo "DEVELOPER_DIR=$XCODE_DEVELOPER_DIR" >> "$GITHUB_ENV"

      - name: Print toolchain details
        shell: bash
        run: |
          set -euo pipefail
          sw_vers
          echo "DEVELOPER_DIR=$DEVELOPER_DIR"
          xcodebuild -version

          if ! xcodebuild -version | grep -q '^Xcode 13\.'; then
            echo "Xcode 13.x is required for this legacy iOS 9 build."
            exit 1
          fi

      - name: Build debug target
        shell: bash
        run: bash ./Scripts/build-debug.sh

      - name: Run static analysis
        shell: bash
        run: bash ./Scripts/lint.sh

      - name: Run unit tests
        shell: bash
        run: bash ./Scripts/run-tests.sh
